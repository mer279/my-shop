<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قيد الانشاء</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
</head>
<body>
    <div class="store-header">
        <div class="profile-section" onclick="viewStatus()">
            <div class="logo-ring" id="logoRing">
                <img id="storeLogo" src="https://via.placeholder.com/150" alt="الشعار">
            </div>
            <span id="storeBrandName" class="brand-name">اسم الماركة</span>
        </div>
    </div>

    <div id="statusModal" class="status-modal hidden" onclick="closeStatus()">
        <div class="status-content" onclick="event.stopPropagation()">
            <div class="status-progress-bar"><div class="progress" id="statusProgress"></div></div>
            <button class="close-status-btn" onclick="closeStatus()">×</button>
            <img id="statusImage" src="" alt="الحالة النشطة">
        </div>
    </div>

    <div class="m" style="padding-top: 80px;"> <div id="display-box">
    <ion-icon id="center-icon" name="home-outline"></ion-icon>
    <h1 id="center-text">الرئيسية</h1>
</div>
    </div>

    <nav class="navigation">
        <ul id="nav-list">
            <li class="list active" data-icon="home-outline" data-text="الرئيسية">
                <a href="#">
                    <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
                    <span class="text">الرئيسية</span>
                </a>
            </li>
            <li class="list" data-icon="cart-outline" data-text="السلة">
    <a href="#">
        <span class="icon"><ion-icon name="cart-outline"></ion-icon></span>
        <span class="text">السلة</span>
    </a>
</li>

            <li class="list" data-icon="chatbubble-outline" data-text="الدردشة">
                <a href="#">
                    <span class="icon"><ion-icon name="chatbubble-outline"></ion-icon></span>
                    <span class="text">الدردشة</span>
                </a>
            </li>
            <li class="list" data-icon="clipboard-outline" data-text="حسب الطلب">
    <a href="#">
        <span class="icon"><ion-icon name="clipboard-outline"></ion-icon></span>
        <span class="text">حسب الطلب</span>
    </a>
</li>

            <li class="list" data-icon="gift-outline" data-text="مصمم الهداياء">
                <a href="#">
                    <span class="icon"><ion-icon name="gift-outline"></ion-icon></span>
                    <span class="text">مصمم الهداياء</span>
                </a>
            </li>
            <div class="indicator"></div>
        </ul>
    </nav>

    <script src="script.js"></script>
</body>
</html>
