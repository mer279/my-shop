<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - إدارة المتجر</title>
    <link rel="stylesheet" href="admin_style.css">
</head>
<body>
    <div class="container">
        <header>
            <h2 id="view-title">إدارة الأقسام</h2>
            <button id="back-btn" class="btn hidden" onclick="goBack()">← رجوع</button>
        </header>

                        <section class="add-form" style="background: #e9ecef; margin-bottom: 25px; border-right: 5px solid #25d366; padding: 15px;">
            <h3 style="margin: 0 0 12px 0; color: #222; font-size: 1.1rem;">⚙️ إعدادات هيدر المتجر (الحالة والشعار)</h3>
            <input type="text" id="storeNameInput" placeholder="تعديل اسم الماركة...">
            <div style="display: flex; gap: 15px; width: 100%; font-size: 0.85rem; color: #444; margin-bottom: 8px;">
                <label style="flex: 1; display: flex; flex-direction: column; gap: 4px;">شعار المتجر الدائري: <input type="file" id="storeLogoInput" accept="image/*"></label>
                <label style="flex: 1; display: flex; flex-direction: column; gap: 4px;">إضافة حالة جديدة (Story): <input type="file" id="storeStatusInput" accept="image/*"></label>
            </div>
            <div style="display: flex; gap: 10px; width: 100%;">
                <button class="btn" onclick="saveStoreProfile()" style="background: #25d366; color: white; flex: 2; font-weight: bold;">حفظ تحديثات الهيدر</button>
                <button class="btn" onclick="deleteStatus()" style="background: #ff4d44; color: white; flex: 1; font-weight: bold;">حذف الحالة</button>
            </div>
        </section>

        <section class="add-form">
            <input type="text" id="itemName" placeholder="الاسم...">

            <input type="number" id="itemPrice" placeholder="السعر..." class="hidden">
            <input type="file" id="itemImage" accept="image/*">
            <button class="btn btn-add" onclick="addNewItem()">+ إضافة جديد</button>
        </section>


        <div id="items-grid" class="grid-container">
            </div>
    </div>
    <script src="admin_script.js"></script>
</body>
</html>
